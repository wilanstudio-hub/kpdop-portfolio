<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPDOP — Krittin Patkuldilok</title>
<style>
  :root{
    --black:#0a0a0a;
    --white:#f5f5f3;
    --grey:#8a8a85;
    --line: rgba(245,245,243,0.14);
    --accent:#f5f5f3;
    --grid-cols:repeat(auto-fit, minmax(320px, 1fr));
    --serif: 'Times New Roman', 'Noto Serif', serif;
    --sans: 'Helvetica Neue', Arial, sans-serif;
  }
  [data-theme="light"]{
    --black:#f5f5f3;
    --white:#0a0a0a;
    --grey:#5a5a55;
    --line: rgba(10,10,10,0.12);
  }
  .hero-content, .hero-eyebrow, .hero h1, .hero-role, .scroll-cue{
    color:#f5f5f3;
  }
  .hero-eyebrow, .hero-role, .scroll-cue{ color:rgba(245,245,243,0.6); }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--black); color:var(--white);
    font-family:var(--sans); -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  a{color:inherit; text-decoration:none;}
  ::selection{ background:var(--white); color:var(--black); }

  header{
    position:fixed; top:0; left:0; width:100%; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:28px 5vw; mix-blend-mode:difference; transition:padding .4s ease;
  }
  header.scrolled{ padding:16px 5vw; }
  .logo{ font-family:var(--serif); font-size:15px; letter-spacing:6px; font-weight:400; }
  nav{ display:flex; gap:34px; }
  nav a{
    font-size:11px; letter-spacing:3px; font-weight:300;
    position:relative; padding-bottom:4px;
  }
  nav a::after{
    content:''; position:absolute; left:0; bottom:0;
    width:0%; height:1px; background:var(--accent); transition:width .35s ease;
  }
  nav a:hover::after{ width:100%; }
  .nav-toggle{ display:none; }

  .hero{
    position:relative; height:100vh; width:100%;
    display:flex; align-items:flex-end; overflow:hidden;
  }
  .hero iframe{
    position:absolute; top:50%; left:50%;
    width:100vw; height:56.25vw;
    min-height:100vh; min-width:177.78vh;
    transform:translate(-50%,-50%);
    pointer-events:none; opacity:.85;
  }
  .hero::before{
    content:''; position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(10,10,10,.15) 0%, rgba(10,10,10,.1) 40%, rgba(10,10,10,.85) 100%);
    z-index:1;
  }
  .hero-content{ position:relative; z-index:2; padding:0 5vw 64px; width:100%; }
  .hero-eyebrow{
    font-size:11px; letter-spacing:5px; color:var(--grey);
    margin-bottom:18px; opacity:0; animation:fadeUp 1s ease .2s forwards;
  }
  .hero h1{
    font-family:var(--serif); font-weight:400;
    font-size:clamp(38px, 7vw, 96px); line-height:.98; letter-spacing:-1px;
    opacity:0; animation:fadeUp 1.1s ease .4s forwards;
  }
  .hero-role{
    margin-top:18px; font-size:13px; letter-spacing:4px; color:var(--grey);
    text-transform:uppercase; opacity:0; animation:fadeUp 1.1s ease .65s forwards;
  }
  @keyframes fadeUp{ from{opacity:0; transform:translateY(22px);} to{opacity:1; transform:translateY(0);} }
  .scroll-cue{
    position:absolute; bottom:28px; right:5vw; z-index:2;
    font-size:10px; letter-spacing:3px; color:var(--grey);
    writing-mode:vertical-rl; display:flex; align-items:center; gap:10px;
    opacity:0; animation:fadeUp 1s ease 1s forwards;
  }
  .scroll-cue::after{ content:''; width:1px; height:40px; background:var(--grey); }

  section{ padding:140px 5vw; border-top:1px solid var(--line); }
  .intro{ display:grid; grid-template-columns:1fr 1.4fr; gap:80px; }
  .eyebrow{
    font-size:11px; letter-spacing:4px; color:var(--grey);
    text-transform:uppercase; margin-bottom:24px; display:block;
  }
  .intro-name{ font-family:var(--serif); font-size:clamp(28px, 3.4vw, 46px); line-height:1.15; font-weight:400; }
  .intro-role{ font-size:13px; letter-spacing:3px; color:var(--grey); margin-top:14px; text-transform:uppercase; }
  .bio p{ font-size:16px; line-height:1.85; color:#cfcfca; font-weight:300; max-width:640px; }
  .bio p + p{ margin-top:22px; }
  .bio .quote{
    font-family:var(--serif); font-style:italic; font-size:20px; color:var(--white);
    margin-top:36px; line-height:1.6; border-left:1px solid var(--white); padding-left:24px;
  }

  .work-section{ padding:120px 5vw; border-top:1px solid var(--line); }
  .work-header{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom:56px; flex-wrap:wrap; gap:16px;
  }
  .work-title{ font-family:var(--serif); font-size:clamp(26px, 3vw, 40px); letter-spacing:2px; }
  .work-count{ font-size:12px; letter-spacing:2px; color:var(--grey); }
  .reel-grid{ display:grid; grid-template-columns:var(--grid-cols); gap:4px; }
  .reel-card{
    position:relative; aspect-ratio:16/9; background:#111; overflow:hidden; cursor:pointer;
  }
  .reel-card iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; }
  .reel-card .card-label{
    position:absolute; bottom:0; left:0; right:0; padding:18px 20px;
    background:linear-gradient(0deg, rgba(0,0,0,.75), transparent);
    font-size:12px; letter-spacing:2px; text-transform:uppercase;
    pointer-events:none; opacity:0; transform:translateY(8px);
    transition:opacity .35s ease, transform .35s ease;
  }
  .reel-card:hover .card-label{ opacity:1; transform:translateY(0); }

  .highlight-card{
    position:relative; aspect-ratio:16/9; width:100%; background:#111;
    overflow:hidden; margin-bottom:4px; cursor:pointer;
  }
  .highlight-card iframe,
  .highlight-card video{
    position:absolute; inset:0; width:100%; height:100%; border:0; object-fit:cover;
  }
  .highlight-label{
    position:absolute; bottom:0; left:0; right:0;
    padding:32px 40px 28px;
    background:linear-gradient(0deg, rgba(0,0,0,.82) 0%, transparent 100%);
    display:flex; align-items:flex-end; justify-content:space-between; gap:24px;
    pointer-events:none;
  }
  .highlight-title{
    font-family:var(--serif); font-size:clamp(18px, 2.6vw, 34px);
    font-weight:400; letter-spacing:1px; color:#f5f5f3;
  }
  .highlight-badge{
    flex-shrink:0; font-size:9px; letter-spacing:3px; text-transform:uppercase;
    color:var(--accent); border:1px solid var(--accent); padding:5px 12px;
  }

  .gear-list{
    display:grid; grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
    gap:32px 40px; margin-top:8px;
  }
  .gear-item{ border-bottom:1px solid var(--line); padding-bottom:14px; }
  .gear-item .gear-cat{
    font-size:10px; letter-spacing:2px; color:var(--grey); text-transform:uppercase;
    margin-bottom:8px; display:block;
  }
  .gear-item .gear-name{ font-size:15px; font-weight:300; }

  .contact{ text-align:center; padding:160px 5vw 80px; border-top:1px solid var(--line); }
  .contact-title{
    font-family:var(--serif); font-size:clamp(28px, 4.6vw, 56px);
    line-height:1.2; max-width:760px; margin:0 auto 48px;
  }
  .contact-links{ display:flex; flex-direction:column; align-items:center; gap:16px; }
  .contact-links a{ font-size:15px; letter-spacing:2px; color:var(--grey); transition:color .3s ease; }
  .contact-links a:hover{ color:var(--white); }

  footer{
    display:flex; align-items:center; justify-content:space-between;
    padding:32px 5vw; border-top:1px solid var(--line);
    font-size:11px; letter-spacing:2px; color:var(--grey);
  }
  .social{ display:flex; gap:24px; }
  .social a{ color:var(--grey); transition:color .3s ease; }
  .social a:hover{ color:var(--white); }

  #loadingScreen{
    position:fixed; inset:0; background:var(--black);
    display:flex; align-items:center; justify-content:center; z-index:1000;
    font-size:11px; letter-spacing:4px; color:var(--grey);
    transition:opacity .5s ease; text-align:center; padding:0 24px; line-height:2;
  }

  #pageBuilder{ display:flex; flex-direction:column; }
  @media (max-width:860px){
    nav{ display:none; }
    .nav-toggle{ display:block; font-size:11px; letter-spacing:2px; }
    .intro{ grid-template-columns:1fr; gap:40px; }
    section, .work-section{ padding:90px 6vw; }
    footer{ flex-direction:column; gap:18px; text-align:center; }
  }
</style>
</head>
<body>

<div id="loadingScreen">LOADING</div>

<header id="siteHeader">
  <a href="#top" class="logo" id="navLogo">K P D O P</a>
  <nav>
    <a href="#narrative">Narrative</a>
    <a href="#commercial">Commercial</a>
    <a href="#internet">Internet&nbsp;Content</a>
    <a href="#bio">Bio</a>
    <a href="#gear">Gear</a>
    <a href="#contact">Contact</a>
  </nav>
  <a href="#contact" class="nav-toggle">Menu</a>
</header>

<section class="hero" id="top" style="padding:0; border:none;">
  <iframe id="heroIframe" src="" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
  <div class="hero-content">
    <div class="hero-eyebrow" id="heroEyebrow"></div>
    <h1 id="heroName"></h1>
    <div class="hero-role" id="heroRole"></div>
  </div>
  <div class="scroll-cue">SCROLL</div>
</section>

<main id="pageBuilder">
<section id="bio">
  <div class="intro">
    <div>
      <span class="eyebrow">Who is KP</span>
      <div class="intro-name" id="bioName"></div>
      <div class="intro-role" id="bioRole"></div>
    </div>
    <div class="bio" id="bioParagraphs"></div>
  </div>
</section>

<section class="work-section" id="narrative">
  <div class="work-header">
    <div class="work-title">N A R R A T I V E</div>
    <div class="work-count" id="narrativeCount"></div>
  </div>
  <div id="narrativeHighlight"></div>
  <div class="reel-grid" id="narrativeGrid"></div>
</section>

<section class="work-section" id="commercial">
  <div class="work-header">
    <div class="work-title">C O M M E R C I A L</div>
    <div class="work-count" id="commercialCount"></div>
  </div>
  <div id="commercialHighlight"></div>
  <div class="reel-grid" id="commercialGrid"></div>
</section>

<section class="work-section" id="internet">
  <div class="work-header">
    <div class="work-title">INTERNET CONTENT</div>
    <div class="work-count" id="internetCount"></div>
  </div>
  <div id="internetHighlight"></div>
  <div class="reel-grid" id="internetGrid"></div>
</section>

<section id="gear">
  <span class="eyebrow">Equipment</span>
  <div class="work-title" style="margin-bottom:0;">G E A R</div>
  <div class="gear-list" id="gearList"></div>
</section>

<section class="contact" id="contact" style="padding-top:160px;">
  <span class="eyebrow">Get in touch</span>
  <div class="contact-title" id="contactTitle"></div>
  <div class="contact-links">
    <a id="contactEmail" href="#"></a>
    <a id="contactPhone" href="#"></a>
  </div>
</section>
</main>

<footer>
  <div id="footerCopy"></div>
  <div class="social">
    <a id="vimeoLink" href="#" target="_blank" rel="noopener">Vimeo</a>
    <a id="instagramLink" href="#" target="_blank" rel="noopener">Instagram</a>
  </div>
</footer>

<script>
  /* ============================================================
     SANITY CONFIG — แก้แค่ตรงนี้
     1. เอา Project ID จาก sanity.io/manage มาใส่แทน YOUR_PROJECT_ID
     2. dataset ปกติชื่อ "production" ถ้าตั้งชื่ออื่นให้แก้ตาม
  ============================================================ */
  const SANITY_PROJECT_ID = 'bd946qlz';
  const SANITY_DATASET = 'production';
  /* ============================================================ */

  const GROQ_QUERY = `{
    "site": *[_type=="siteSettings"][0],
    "bio": *[_type=="bio"][0],
    "narrative": *[_type=="video" && category=="narrative"]|order(order asc){ "videoId": vimeoId, title, youtubeId, "videoFileRef": videoFile.asset._ref, isHighlight },
    "commercial": *[_type=="video" && category=="commercial"]|order(order asc){ "videoId": vimeoId, title, youtubeId, "videoFileRef": videoFile.asset._ref, isHighlight },
    "internet": *[_type=="video" && category=="internet"]|order(order asc){ "videoId": vimeoId, title, youtubeId, "videoFileRef": videoFile.asset._ref, isHighlight },
    "gear": *[_type=="gearItem"]|order(order asc){ category, name },
    "homePage": *[_type=="homePage"][0]{ sections }
  }`;

  async function loadSiteData() {
    const loadEl = document.getElementById('loadingScreen');
    if (SANITY_PROJECT_ID === 'YOUR_PROJECT_ID') {
      loadEl.innerHTML = 'ยังไม่ได้ตั้งค่า SANITY_PROJECT_ID<br>เปิดไฟล์ index.html แล้วใส่ Project ID ของคุณก่อน';
      return;
    }
    try {
      const url = `https://${SANITY_PROJECT_ID}.api.sanity.io/v2024-01-01/data/query/${SANITY_DATASET}?query=${encodeURIComponent(GROQ_QUERY)}`;
      const res = await fetch(url);
      const json = await res.json();
      renderSite(json.result);
      loadEl.style.opacity = '0';
      setTimeout(() => loadEl.style.display = 'none', 500);
    } catch (err) {
      console.error('Failed to load from Sanity', err);
      loadEl.innerHTML = 'FAILED TO LOAD CONTENT<br><span style="font-size:10px">เช็ค Project ID และ CORS settings ใน sanity.io/manage</span>';
    }
  }

  function applySectionOrder(sections) {
    if (!sections || !sections.length) return;
    const all = ['bio', 'narrative', 'commercial', 'internet', 'gear', 'contact'];
    const included = new Set();
    sections.forEach((sec, i) => {
      let id;
      if (sec._type === 'section_bio') id = 'bio';
      else if (sec._type === 'section_video') id = sec.category;
      else if (sec._type === 'section_gear') id = 'gear';
      else if (sec._type === 'section_contact') id = 'contact';
      if (!id) return;
      included.add(id);
      const el = document.getElementById(id);
      if (el) el.style.order = String(i + 1);
    });
    all.forEach(id => {
      if (!included.has(id)) {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
      }
    });
  }

  function applyTheme(site) {
    const root = document.documentElement;
    const mode = site.colorMode || 'dark';
    root.setAttribute('data-theme', mode);

    const accentMap = {
      gold: '#c9a96e',
      cyan: '#64c8c0',
      rose: '#e07070',
      white: mode === 'light' ? '#0a0a0a' : '#f5f5f3',
    };
    root.style.setProperty('--accent', accentMap[site.accentColor] || accentMap.white);

    const gridMap = {
      large: 'repeat(2, 1fr)',
      single: '1fr',
      grid: 'repeat(auto-fit, minmax(320px, 1fr))',
    };
    root.style.setProperty('--grid-cols', gridMap[site.videoGridLayout] || gridMap.grid);
  }

  function vimeoEmbed(id, autoplay) {
    return `https://player.vimeo.com/video/${id}?background=1&loop=1&muted=1&autoplay=${autoplay ? 1 : 0}`;
  }

  function extractYoutubeId(input) {
    if (!input) return null;
    const patterns = [
      /(?:youtu\.be\/)([A-Za-z0-9_-]{11})/,
      /(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/,
      /^([A-Za-z0-9_-]{11})$/,
    ];
    for (const re of patterns) {
      const m = input.match(re);
      if (m) return m[1];
    }
    return input;
  }

  function youtubeEmbed(id, autoplay) {
    return `https://www.youtube.com/embed/${id}?mute=1&loop=1&playlist=${id}&controls=0&modestbranding=1&playsinline=1${autoplay ? '&autoplay=1' : ''}`;
  }

  function videoFileUrl(ref) {
    if (!ref) return null;
    const match = ref.match(/^file-(.+)-([^-]+)$/);
    if (!match) return null;
    return `https://cdn.sanity.io/files/${SANITY_PROJECT_ID}/${SANITY_DATASET}/${match[1]}.${match[2]}`;
  }

  function buildVideoCard(item) {
    const card = document.createElement('div');
    card.className = 'reel-card';
    const label = document.createElement('div');
    label.className = 'card-label';
    label.textContent = item.title || '';

    const ytId = extractYoutubeId(item.youtubeId);
    const fileUrl = videoFileUrl(item.videoFileRef);

    if (ytId) {
      const iframe = document.createElement('iframe');
      const baseSrc = youtubeEmbed(ytId, false);
      iframe.src = baseSrc;
      iframe.setAttribute('frameborder', '0');
      iframe.setAttribute('allow', 'autoplay; fullscreen');
      card.appendChild(iframe);
      card.addEventListener('mouseenter', () => { iframe.src = youtubeEmbed(ytId, true); });
      card.addEventListener('mouseleave', () => { iframe.src = baseSrc; });
    } else if (fileUrl) {
      const video = document.createElement('video');
      video.src = fileUrl;
      video.muted = true;
      video.loop = true;
      video.playsInline = true;
      video.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;';
      card.appendChild(video);
      card.addEventListener('mouseenter', () => video.play());
      card.addEventListener('mouseleave', () => { video.pause(); video.currentTime = 0; });
    } else if (item.videoId) {
      const iframe = document.createElement('iframe');
      const baseSrc = vimeoEmbed(item.videoId, false);
      iframe.src = baseSrc;
      iframe.setAttribute('frameborder', '0');
      iframe.setAttribute('allow', 'autoplay; fullscreen');
      card.appendChild(iframe);
      card.addEventListener('mouseenter', () => { iframe.src = vimeoEmbed(item.videoId, true); });
      card.addEventListener('mouseleave', () => { iframe.src = baseSrc; });
    }

    card.appendChild(label);
    return card;
  }

  function buildReelGrid(containerId, items) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    (items || []).forEach(item => container.appendChild(buildVideoCard(item)));
  }

  function buildHighlightCard(wrapperId, item) {
    const wrap = document.getElementById(wrapperId);
    wrap.innerHTML = '';
    if (!item) return;

    const card = document.createElement('div');
    card.className = 'highlight-card';

    const ytId = extractYoutubeId(item.youtubeId);
    const fileUrl = videoFileUrl(item.videoFileRef);

    if (ytId) {
      const iframe = document.createElement('iframe');
      const baseSrc = youtubeEmbed(ytId, false);
      iframe.src = baseSrc;
      iframe.setAttribute('frameborder', '0');
      iframe.setAttribute('allow', 'autoplay; fullscreen');
      card.appendChild(iframe);
      card.addEventListener('mouseenter', () => { iframe.src = youtubeEmbed(ytId, true); });
      card.addEventListener('mouseleave', () => { iframe.src = baseSrc; });
    } else if (fileUrl) {
      const video = document.createElement('video');
      video.src = fileUrl;
      video.muted = true;
      video.loop = true;
      video.playsInline = true;
      card.appendChild(video);
      card.addEventListener('mouseenter', () => video.play());
      card.addEventListener('mouseleave', () => { video.pause(); video.currentTime = 0; });
    } else if (item.videoId) {
      const iframe = document.createElement('iframe');
      const baseSrc = vimeoEmbed(item.videoId, false);
      iframe.src = baseSrc;
      iframe.setAttribute('frameborder', '0');
      iframe.setAttribute('allow', 'autoplay; fullscreen');
      card.appendChild(iframe);
      card.addEventListener('mouseenter', () => { iframe.src = vimeoEmbed(item.videoId, true); });
      card.addEventListener('mouseleave', () => { iframe.src = baseSrc; });
    }

    const label = document.createElement('div');
    label.className = 'highlight-label';
    const title = document.createElement('div');
    title.className = 'highlight-title';
    title.textContent = item.title || '';
    const badge = document.createElement('div');
    badge.className = 'highlight-badge';
    badge.textContent = 'FEATURED';
    label.appendChild(title);
    label.appendChild(badge);
    card.appendChild(label);
    wrap.appendChild(card);
  }

  function renderSite(data) {
    if (!data || !data.site) {
      document.getElementById('loadingScreen').innerHTML =
        'NO CONTENT YET<br><span style="font-size:10px">เข้า Sanity Studio แล้วเพิ่มข้อมูล หรือ import seed.ndjson ก่อน</span>';
      return;
    }
    const site = data.site, bio = data.bio || {};
    applyTheme(site);
    if (data.homePage) applySectionOrder(data.homePage.sections);

    document.getElementById('navLogo').textContent = site.logo || 'K P D O P';
    document.getElementById('heroIframe').src = vimeoEmbed(site.heroVideoId, true);
    document.getElementById('heroEyebrow').textContent = site.heroEyebrow || '';
    document.getElementById('heroName').innerHTML =
      (site.heroFirstName || '') + '<br>' + (site.heroLastName || '');
    document.getElementById('heroRole').textContent = site.heroRole || '';

    document.getElementById('bioName').textContent = bio.name || '';
    document.getElementById('bioRole').textContent = bio.role || '';
    const bioContainer = document.getElementById('bioParagraphs');
    bioContainer.innerHTML = '';
    (bio.paragraphs || []).forEach(p => {
      const el = document.createElement('p');
      el.textContent = p;
      bioContainer.appendChild(el);
    });
    if (bio.quote) {
      const q = document.createElement('p');
      q.className = 'quote';
      q.textContent = '"' + bio.quote + '"';
      bioContainer.appendChild(q);
    }

    ['narrative', 'commercial', 'internet'].forEach(cat => {
      const items = data[cat] || [];
      const highlight = items.find(v => v.isHighlight) || null;
      const rest = items.filter(v => !v.isHighlight);
      buildHighlightCard(cat + 'Highlight', highlight);
      buildReelGrid(cat + 'Grid', rest);
      document.getElementById(cat + 'Count').textContent =
        String(items.length).padStart(2, '0') + ' PROJECTS';
    });

    const gearList = document.getElementById('gearList');
    gearList.innerHTML = '';
    (data.gear || []).forEach(g => {
      const item = document.createElement('div');
      item.className = 'gear-item';
      const cat = document.createElement('span');
      cat.className = 'gear-cat';
      cat.textContent = g.category || '';
      const name = document.createElement('span');
      name.className = 'gear-name';
      name.textContent = g.name || '';
      item.appendChild(cat);
      item.appendChild(name);
      gearList.appendChild(item);
    });

    document.getElementById('contactTitle').textContent = site.contactTitle || '';
    const emailEl = document.getElementById('contactEmail');
    emailEl.textContent = site.email || '';
    emailEl.href = 'mailto:' + (site.email || '');
    const phoneEl = document.getElementById('contactPhone');
    if (site.phone) {
      phoneEl.textContent = site.phone;
      phoneEl.href = 'tel:' + site.phone.replace(/\s+/g, '');
    } else {
      phoneEl.style.display = 'none';
    }

    document.getElementById('footerCopy').textContent = site.copyright || '';
    const vimeoLink = document.getElementById('vimeoLink');
    if (site.vimeoUrl) vimeoLink.href = site.vimeoUrl; else vimeoLink.style.display = 'none';
    const igLink = document.getElementById('instagramLink');
    if (site.instagramUrl) igLink.href = site.instagramUrl; else igLink.style.display = 'none';
  }

  const header = document.getElementById('siteHeader');
  window.addEventListener('scroll', () => {
    if (window.scrollY > 60) header.classList.add('scrolled');
    else header.classList.remove('scrolled');
  });

  loadSiteData();
</script>

</body>
</html>
